<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>中歐九日行程・Wien→Salzburg→Königssee→Budapest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --surface:#F7F8F4;
    --surface-2:#F1F3EC;
    --ink:#1A1C1A;
    --ink-soft:#767E73;
    --ink-faint:#A9AFA3;
    --line:#E7E9E1;
    --wien:#E23A56;
    --wien-soft:#FCE8EB;
    --salzburg:#2E9A4A;
    --salzburg-soft:#E7F5EA;
    --konig:#1C7ED6;
    --konig-soft:#E5F1FC;
    --budapest:#E2660F;
    --budapest-soft:#FBEBDD;
    --gold:#C99A2E;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:9px;
    --shadow:0 1px 3px rgba(20,20,15,0.05), 0 8px 24px rgba(20,20,15,0.05);
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--surface);}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 40px rgba(0,0,0,0.06);
  }

  /* ---------- Header & route stepper (signature element) ---------- */
  header.top{
    position:sticky; top:0; z-index:30;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(10px);
    padding:14px 20px 12px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--ink-soft); font-weight:600; margin:0 0 2px;
  }
  h1.trip-title{
    font-family:var(--font-display);
    font-size:20px; font-weight:600; margin:0 0 12px; letter-spacing:0.01em;
  }
  .route-line{
    display:flex; align-items:flex-start; justify-content:space-between;
    position:relative; padding:0 2px;
  }
  .route-line::before{
    content:''; position:absolute; top:7px; left:16px; right:16px; height:2px;
    background:var(--line); z-index:0;
  }
  .route-node{
    position:relative; z-index:1; display:flex; flex-direction:column; align-items:center;
    gap:6px; background:none; border:none; font-family:var(--font-body);
    cursor:pointer; flex:1; padding:0;
  }
  .route-dot{
    width:16px; height:16px; border-radius:50%; background:var(--bg);
    border:2px solid var(--line); transition:all .25s ease;
  }
  .route-node.active .route-dot{
    background:var(--dot-color, var(--ink)); border-color:var(--dot-color, var(--ink));
    box-shadow:0 0 0 4px color-mix(in srgb, var(--dot-color, var(--ink)) 18%, transparent);
  }
  .route-label{
    font-size:10.5px; font-weight:600; color:var(--ink-faint); white-space:nowrap;
    letter-spacing:0.01em;
  }
  .route-node.active .route-label{ color:var(--ink); }

  /* ---------- Main scroll area ---------- */
  main{ flex:1; padding:18px 20px 110px; overflow-x:hidden; }
  .page{ display:none; animation:fadeIn .2s ease; }
  .page.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  section.block{ margin-bottom:28px; }
  h2.page-title{
    font-family:var(--font-display); font-size:24px; font-weight:600; margin:2px 0 4px;
  }
  p.page-sub{ font-size:13px; color:var(--ink-soft); margin:0 0 18px; line-height:1.5;}

  /* ---------- Day pills (itinerary tab) ---------- */
  .day-pills{
    display:flex; gap:8px; overflow-x:auto; padding:2px 2px 14px; margin:0 -2px 6px;
    scrollbar-width:none;
  }
  .day-pills::-webkit-scrollbar{ display:none; }
  .day-pill{
    flex:0 0 auto; padding:8px 14px; border-radius:999px; border:1.5px solid var(--line);
    background:var(--bg); font-size:12.5px; font-weight:600; color:var(--ink-soft);
    cursor:pointer; white-space:nowrap; font-family:var(--font-body);
  }
  .day-pill.active{ color:#fff; border-color:transparent; }

  .day-header{
    display:flex; align-items:baseline; gap:10px; margin:6px 0 4px;
  }
  .day-num{ font-family:var(--font-display); font-size:34px; font-weight:600; line-height:1; }
  .day-meta{ display:flex; flex-direction:column; gap:2px; }
  .day-city{ font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
  .day-date{ font-size:12px; color:var(--ink-soft); }
  .day-caption{ font-size:14px; font-weight:600; margin:10px 0 16px; color:var(--ink); }

  .timeline{ position:relative; padding-left:20px; }
  .timeline::before{
    content:''; position:absolute; left:5px; top:6px; bottom:6px; width:2px; background:var(--line);
  }
  .t-item{ position:relative; padding-bottom:20px; }
  .t-item:last-child{ padding-bottom:0; }
  .t-dot{
    position:absolute; left:-20px; top:3px; width:12px; height:12px; border-radius:50%;
    background:var(--dot-color, var(--ink)); border:2px solid var(--bg); box-shadow:0 0 0 1.5px var(--dot-color, var(--ink));
  }
  .t-time{ font-size:11.5px; font-weight:700; color:var(--ink-soft); font-variant-numeric:tabular-nums; margin-bottom:2px; }
  .t-title{ font-size:14.5px; font-weight:600; line-height:1.4; }
  .t-note{ font-size:12.5px; color:var(--ink-soft); margin-top:2px; line-height:1.5; }
  .t-map{
    display:inline-flex; align-items:center; gap:4px; margin-top:7px; font-size:11.5px;
    font-weight:600; color:var(--dot-color, var(--ink)); text-decoration:none; padding:5px 10px;
    background:var(--chip-bg, var(--surface-2)); border-radius:999px;
  }
  .t-map svg{ width:12px; height:12px; }

  .day-foot{
    margin-top:18px; padding:14px 16px; background:var(--surface); border-radius:var(--radius-md);
    font-size:12.5px; color:var(--ink-soft); line-height:1.7;
  }
  .day-foot b{ color:var(--ink); }

  /* ---------- Generic cards ---------- */
  .card{
    background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:16px; margin-bottom:12px; box-shadow:var(--shadow);
  }
  .card-head{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .card-icon{
    width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    background:var(--chip-bg, var(--surface-2)); color:var(--dot-color, var(--ink)); flex:0 0 auto;
  }
  .card-icon svg{ width:17px; height:17px; }
  .card-title{ font-size:14.5px; font-weight:700; }
  .card-sub{ font-size:12px; color:var(--ink-soft); margin-top:1px;}
  .kv{ display:flex; justify-content:space-between; gap:12px; padding:7px 0; border-top:1px solid var(--line); font-size:12.5px;}
  .kv:first-of-type{ border-top:none; }
  .kv .k{ color:var(--ink-soft); flex:0 0 auto; }
  .kv .v{ text-align:right; font-weight:600; }
  .tag{
    display:inline-block; font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px;
    background:var(--chip-bg, var(--surface-2)); color:var(--dot-color, var(--ink)); margin-bottom:8px;
  }
  .btn-link{
    display:inline-flex; align-items:center; gap:5px; margin-top:10px; font-size:12.5px; font-weight:700;
    color:var(--dot-color, var(--ink)); text-decoration:none; padding:8px 12px; border-radius:var(--radius-sm);
    background:var(--chip-bg, var(--surface-2)); width:fit-content;
  }
  .btn-link svg{ width:13px; height:13px; }

  /* ---------- Budget ---------- */
  .budget-total{
    background:var(--ink); color:#fff; border-radius:var(--radius-lg); padding:22px 20px; margin-bottom:20px;
  }
  .budget-total .label{ font-size:11px; letter-spacing:0.1em; text-transform:uppercase; opacity:0.65; font-weight:600; }
  .budget-total .amount{ font-family:var(--font-display); font-size:32px; font-weight:600; margin-top:6px; }
  .budget-total .note{ font-size:11.5px; opacity:0.6; margin-top:6px; line-height:1.5; }
  .bud-row{ display:flex; align-items:center; gap:12px; padding:11px 0; border-top:1px solid var(--line); }
  .bud-row:first-child{ border-top:none; }
  .bud-day{ width:34px; font-family:var(--font-display); font-weight:600; font-size:16px; flex:0 0 auto; }
  .bud-bar-wrap{ flex:1; height:6px; background:var(--surface-2); border-radius:4px; overflow:hidden; }
  .bud-bar{ height:100%; border-radius:4px; }
  .bud-amt{ font-size:12px; font-weight:700; color:var(--ink-soft); width:78px; text-align:right; flex:0 0 auto; }

  /* ---------- Packing checklist ---------- */
  .pack-group{ margin-bottom:18px; }
  .pack-group h3{ font-size:13px; font-weight:700; margin:0 0 10px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em;}
  .pack-item{
    display:flex; align-items:center; gap:11px; padding:10px 2px; border-bottom:1px solid var(--line); cursor:pointer;
  }
  .pack-item:last-child{ border-bottom:none; }
  .pack-box{
    width:19px; height:19px; border-radius:6px; border:2px solid var(--line); flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; transition:all .15s ease;
  }
  .pack-box svg{ width:12px; height:12px; opacity:0; transition:opacity .15s ease; }
  .pack-item.checked .pack-box{ background:var(--ink); border-color:var(--ink); }
  .pack-item.checked .pack-box svg{ opacity:1; }
  .pack-text{ font-size:13.5px; flex:1; transition:color .15s ease; }
  .pack-item.checked .pack-text{ color:var(--ink-faint); text-decoration:line-through; }
  .pack-progress{ font-size:12px; color:var(--ink-soft); margin-bottom:14px; font-weight:600;}

  /* ---------- Info tab ---------- */
  .info-section{ margin-bottom:22px; }
  .info-section h3{ font-size:14px; font-weight:700; margin:0 0 8px; display:flex; align-items:center; gap:8px;}
  .info-section h3 svg{ width:16px; height:16px; color:var(--gold);}
  .info-section p, .info-section li{ font-size:13px; color:var(--ink-soft); line-height:1.7; margin:0 0 4px;}
  .info-section ul{ margin:0; padding-left:18px; }

  /* ---------- Bottom nav ---------- */
  nav.bottom{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:460px; background:rgba(255,255,255,0.94); backdrop-filter:blur(12px);
    border-top:1px solid var(--line); display:flex; padding:8px 4px calc(8px + env(safe-area-inset-bottom));
    z-index:40;
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none;
    color:var(--ink-faint); font-family:var(--font-body); cursor:pointer; padding:4px 0;
  }
  .nav-btn svg{ width:20px; height:20px; }
  .nav-btn span{ font-size:9.5px; font-weight:600; letter-spacing:0.01em; }
  .nav-btn.active{ color:var(--ink); }

  ::selection{ background:var(--wien-soft); }
</style>
</head>

/* ============================= RENDER: HEADER STEPPER ============================= */
const ROUTE_CITY_MAP = {wien:'wien', salzburg:'salzburg', konig:'salzburg', budapest:'budapest'};
function renderRoute(){
  const el = document.getElementById('routeLine');
  const curCity = ROUTE_CITY_MAP[cityOfDay(activeDay)];
  el.innerHTML = ROUTE.map((r,i)=>{
    const active = (activeTab==='itinerary' && activeDay!==9 && curCity===r.city && r.id!=='return') || (activeTab==='itinerary' && activeDay===9 && r.id==='return');
    return `<button class="route-node ${active?'active':''}" style="--dot-color:${CITY[r.city].color}" onclick="jumpCity('${r.id}')">
      <span class="route-dot"></span>
      <span class="route-label">${r.label}</span>
    </button>`;
  }).join('');
}
function cityOfDay(n){ return DAYS.find(d=>d.num===n).city; }
function jumpCity(id){
  activeTab='itinerary';
  if(id==='wien') activeDay=1;
  if(id==='salzburg') activeDay=5;
  if(id==='budapest') activeDay=7;
  if(id==='return') activeDay=9;
  renderAll();
}

/* ============================= RENDER: BOTTOM NAV ============================= */
function renderNav(){
  const el = document.getElementById('bottomNav');
  el.innerHTML = TABS.map(t=>`
    <button class="nav-btn ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">
      ${icon(t.icon)}
      <span>${t.label}</span>
    </button>`).join('');
}
function setTab(id){ activeTab=id; renderAll(); }

/* ============================= RENDER: PAGES ============================= */
function renderMain(){
  const el = document.getElementById('main');
  if(activeTab==='itinerary') el.innerHTML = pageItinerary();
  else if(activeTab==='transport') el.innerHTML = pageTransport();
  else if(activeTab==='stay') el.innerHTML = pageStay();
  else if(activeTab==='bookings') el.innerHTML = pageBookings();
  else if(activeTab==='packing') el.innerHTML = pagePacking();
  else if(activeTab==='budget') el.innerHTML = pageBudget();
  else if(activeTab==='info') el.innerHTML = pageInfo();
}

function pageItinerary(){
  const d = DAYS.find(x=>x.num===activeDay);
  const c = CITY[d.city];
  const pills = DAYS.map(x=>`<button class="day-pill ${x.num===activeDay?'active':''}"
      style="${x.num===activeDay?'background:'+CITY[x.city].color:''}" onclick="goDay(${x.num})">Day ${x.num}</button>`).join('');
  const items = d.items.map(it=>`
    <div class="t-item" style="--dot-color:${c.color}">
      <span class="t-dot" style="--dot-color:${c.color}"></span>
      <div class="t-time">${it.time}</div>
      <div class="t-title">${it.title}</div>
      ${it.note?`<div class="t-note">${it.note}</div>`:''}
      ${it.map?`<a class="t-map" style="--dot-color:${c.color};--chip-bg:${c.soft}" href="${mapUrl(it.map)}" target="_blank" rel="noopener">${icon('pin')} 開啟導航</a>`:''}
    </div>`).join('');
  return `
    <div class="day-pills">${pills}</div>
    <div class="day-header">
      <span class="day-num">${String(d.num).padStart(2,'0')}</span>
      <div class="day-meta">
        <span class="day-city" style="color:${c.color}">${c.label}</span>
        <span class="day-date">${d.date}</span>
      </div>
    </div>
    <div class="day-caption">${d.caption}</div>
    <div class="timeline">${items}</div>
    ${d.tip? `<div class="day-foot">💡 ${d.tip}</div>`:''}
    <div class="day-foot"><b>預估花費：</b>${d.budget}${d.stay?`<br><b>住宿：</b>${d.stay}`:''}</div>
  `;
}
function goDay(n){ activeDay=n; renderAll(); document.getElementById('main').scrollTop=0; }

    </div>`;
  }).join('');
  return `<h2 class="page-title">訂單票券</h2><p class="page-sub">所有已確認的訂票／訂房資訊，方便現場快速查找。</p>${rows}`;
}

function pagePacking(){
  const total = PACKING.reduce((s,g)=>s+g.items.length,0);
  const checkedCount = Object.values(checkedPacking).filter(Boolean).length;
  const groups = PACKING.map((g,gi)=>`
    <div class="pack-group">
      <h3>${g.group}</h3>
      ${g.items.map((it,ii)=>{
        const key = gi+'-'+ii;
        const on = checkedPacking[key];
        return `<div class="pack-item ${on?'checked':''}" onclick="togglePack('${key}')">
          <span class="pack-box">${on?checkSvg():''}</span>
          <span class="pack-text">${it}</span>
        </div>`;
      }).join('')}
    </div>`).join('');
  return `<h2 class="page-title">行李清單</h2>
    <p class="pack-progress">已勾選 ${checkedCount} / ${total} 項</p>
    ${groups}`;
}
function checkSvg(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,13 10,18 19,7"/></svg>'; }
function togglePack(key){ checkedPacking[key]=!checkedPacking[key]; renderMain(); }

function pageBudget(){
  const perDay = DAYS.map(d=>{
    const nums = (d.budget.match(/€\s?(\d+)/g)||[]).map(x=>parseInt(x.replace(/[^\d]/g,'')));
    const est = nums.length? Math.max(...nums) : 0;
    return {num:d.num, city:d.city, est};
  });
  const maxEst = Math.max(...perDay.map(p=>p.est),1);
  const rows = perDay.map(p=>`
    <div class="bud-row">
      <span class="bud-day">D${p.num}</span>
      <div class="bud-bar-wrap"><div class="bud-bar" style="width:${(p.est/maxEst*100)}%; background:${CITY[p.city].color}"></div></div>
      <span class="bud-amt">${p.est?'~€'+p.est+'/人':'—'}</span>
    </div>`).join('');
  return `<h2 class="page-title">預算總覽</h2>
    <div class="budget-total">
      <div class="label">全程粗估（不含機票／住宿／已付門票）</div>
      <div class="amount">€ 350 – 480 / 人</div>
      <div class="note">此為粗估花費區間，實際依用餐與購物習慣調整。可於下方查看各日細項預估。</div>
    </div>
    ${rows}`;
}

function pageInfo(){
  const sections = INFO.map(s=>`
    <div class="info-section">
      ${s.title?`<h3>${icon(s.icon)} ${s.title}${s.sub?` <span style="color:var(--ink-faint);font-weight:600;">・${s.sub}</span>`:''}</h3>`:`<h3 style="margin-top:-6px;">${icon(s.icon)} <span style="color:var(--ink-faint);font-weight:600;">${s.sub}</span></h3>`}
      ${s.body?`<p>${s.body}</p>`:''}
      ${s.list?`<ul>${s.list.map(x=>`<li>${x}</li>`).join('')}</ul>`:''}
    </div>`).join('');
  return `<h2 class="page-title">實用資訊</h2><p class="page-sub">出發前後的通用提醒與注意事項。</p>${sections}`;
}

/* ============================= INIT ============================= */
function renderAll(){ renderRoute(); renderNav(); renderMain(); }
renderAll();
</script>
</body>
</html>
